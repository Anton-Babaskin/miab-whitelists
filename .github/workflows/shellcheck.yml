name: ShellCheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint add_whitelists.sh
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n add_whitelists.sh

      - name: ShellCheck
        run: shellcheck add_whitelists.sh
