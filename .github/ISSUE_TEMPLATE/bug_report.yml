name: Bug report
description: Report a problem with the script or documentation
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below.
        **Do not include real corporate domains, IP addresses, mail logs, or private infrastructure details.**

  - type: input
    id: os
    attributes:
      label: Operating system
      description: "e.g. Ubuntu 22.04, Debian 12"
    validations:
      required: true

  - type: input
    id: miab_version
    attributes:
      label: Mail-in-a-Box version
      description: "Run: curl -s https://box.example.com/admin/me | jq .version (or check your MiaB admin panel)"
    validations:
      required: false

  - type: input
    id: script_version
    attributes:
      label: Script version
      description: "Run: add_whitelists.sh --version"
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command you ran
      description: "e.g. sudo add_whitelists.sh -f examples/whitelist.example.txt"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste sanitized output (replace real domains/IPs with example.com / 203.0.113.x).
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I have removed all real corporate domains, IP addresses, mail logs, tokens, and private infrastructure details from this report.
          required: true
