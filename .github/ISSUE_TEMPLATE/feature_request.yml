name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you need and why.
        **Do not include real corporate domains, IP addresses, or private infrastructure details.**

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What are you trying to accomplish that the script currently does not support?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you would like this to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you found any workarounds or alternative approaches?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help (links, references, etc.).
    validations:
      required: false
